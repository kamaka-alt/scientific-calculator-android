name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.4 --distribution-type=bin

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScientificCalculator-debug-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Scientific Calculator v${{ github.run_number }}"
          body: |
            ## 📲 How to install on your phone

            1. Tap **ScientificCalculator-v${{ github.run_number }}.apk** below
            2. Your browser will download it
            3. Open it from your **Downloads** folder
            4. If asked, allow **Install unknown apps**
            5. Tap **Install** — done!

            ---
            **Features:** Full scientific keyboard · Calculus (d/dx, ∫) · Complex numbers · Matrices · Statistics · Base-N/Bitwise · Unit conversions · 30+ physical constants · Equation solver
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
